<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Karl Pilkington Virtual Pub Quiz</title>

<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
:root{
  --bgTop:#6a2f8f;
  --bgMid:#7b2aa4;
  --bgBot:#ff1aa6;

  --btn:#143d95;
  --btnEdge:#0c2c73;

  --text:#ffffff;
  --outline:#000000;
  --muted: rgba(255,255,255,.78);

  --stage: 760px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  display:flex;
  justify-content:center;
  background: linear-gradient(180deg, var(--bgTop), var(--bgMid), var(--bgBot));
  color:var(--text);
  text-align:center;
}

.stage{
  width:min(var(--stage), 100%);
  padding:20px;
}

/* TITLE */
.title{
  margin-top:20px;
  font-family:'Luckiest Guy', cursive;
  font-size:38px;
  text-transform:uppercase;
  text-shadow:3px 3px 0 var(--outline);
}

.titleSub{
  font-size:28px;
}

.eventDate{
  margin-top:8px;
  font-family:'Luckiest Guy', cursive;
  font-size:18px;
  text-shadow:2px 2px 0 var(--outline);
  color:blue;
}

/* IMAGE */
.art{
  width:100%;
  max-width:550px;
  margin:15px auto;
}

/* COUNTDOWN */
.countWrap{
  margin:15px auto;
  max-width:1240px;
}

.countGrid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
}

.tile{
  background:#222;
  padding:10px;
  border-radius:22px;
}

.num{
  font-family:'Luckiest Guy', cursive;
  font-size:24px;
  font-weight:400;
  text-shadow:2px 2px 0 var(--outline);
}

.lbl{
  font-family:'Luckiest Guy', cursive;
  font-size:12px;
  text-shadow:2px 2px 0 var(--outline);
}

/* BUTTONS */
.btnRow{
  margin:25px auto 0;
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:18px;
  max-width:1240px;
}

.btn{
  font-family:"Luckiest Guy", system-ui, sans-serif;
  width:100%;
  min-width:0;
  padding:14px 10px;
  border-radius:22px;
  background:var(--btn);
  border:0;
  cursor:pointer;
  text-decoration:none;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:16px;
  box-shadow:
    0 10px 0 var(--btnEdge),
    0 22px 34px rgba(0,0,0,.25);
  text-shadow:
    -2px -2px 0 var(--outline),
     2px -2px 0 var(--outline),
    -2px  2px 0 var(--outline),
     2px  2px 0 var(--outline);
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.btn:active{
  transform:translateY(4px);
  box-shadow:
    0 6px 0 var(--btnEdge),
    0 14px 22px rgba(0,0,0,.22);
}

/* SHARE MESSAGE */
.toast{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  min-height:18px;
}

@media (max-width: 900px){
  .countGrid,
  .btnRow{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media (max-width: 520px){
  .title{
    font-size:30px;
  }

  .titleSub{
    font-size:22px;
  }

  .countGrid,
  .btnRow{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="stage">

<div class="title">
  THE KARL PILKINGTON<br>
  <span class="titleSub">VIRTUAL PUB QUIZ</span>
  <div class="eventDate">Monday, 1st June 2026</div>
</div>

<img src="art.png" class="art" alt="Karl Pilkington Virtual Pub Quiz artwork">

<div class="countWrap">
  <div class="countGrid">
    <div class="tile"><div class="num" id="days">0</div><div class="lbl">Days</div></div>
    <div class="tile"><div class="num" id="hours">0</div><div class="lbl">Hours</div></div>
    <div class="tile"><div class="num" id="mins">0</div><div class="lbl">Minutes</div></div>
    <div class="tile"><div class="num" id="secs">0</div><div class="lbl">Seconds</div></div>
  </div>
</div>

<div class="btnRow">
  <button class="btn" onclick="buyTicket()">BUY TICKET</button>
  <a class="btn" href="info.html">INFO & PRIVACY</a>
  <a class="btn" href="prizes.html">PRIZES</a>
  <button class="btn" onclick="copyLink()">SHARE</button>
</div>

<div class="toast" id="toast"></div>

</div>

<script>
const eventDate = new Date("2026-06-01T21:00:00+01:00");

function updateCountdown(){
  const now = new Date();
  let diff = eventDate - now;

  if(diff < 0) diff = 0;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const mins = Math.floor((diff / (1000 * 60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("mins").textContent = mins;
  document.getElementById("secs").textContent = secs;
}

setInterval(updateCountdown, 1000);
updateCountdown();

async function buyTicket(){
  const toast = document.getElementById("toast");
  const buttons = document.querySelectorAll(".btn");

  toast.innerText = "Redirecting to checkout...";
  buttons.forEach(btn => btn.disabled = true);

  try {
    const res = await fetch("https://us-central1-quizzicks.cloudfunctions.net/createCheckoutSession", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    });

    const data = await res.json();

    if (!res.ok || !data.url) {
      throw new Error(data.error || "Failed to create checkout session");
    }

    window.location.href = data.url;
  } catch (err) {
    console.error(err);
    toast.innerText = "Checkout failed. Please try again.";
    buttons.forEach(btn => btn.disabled = false);
  }
}

/* SHARE */
function copyLink(){
  const url = window.location.href;
  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(url).then(() => {
    toast.innerText = "Link copied 👍";
    setTimeout(() => {
      toast.innerText = "";
    }, 3000);
  }).catch(() => {
    toast.innerText = "Could not copy link.";
  });
}
</script>

</body>
</html>
